<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales360 - Connexion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-logo">Sales360</div>
      <p class="login-subtitle" data-i18n="loginSubtitle">Connectez-vous à votre compte Sales360</p>
      
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" data-i18n="emailAddress">Adresse email</label>
          <input type="email" class="form-input" placeholder="vous@example.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" data-i18n="password">Mot de passe</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox">
            <span data-i18n="rememberMe">Se souvenir de moi</span>
          </label>
          <a href="#" style="color: var(--accent-orange); text-decoration: none; font-weight: 600;" data-i18n="forgotPassword">Mot de passe oublié ?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" data-i18n="signIn">Se connecter</button>
      </form>
      
      <div style="margin-top: 24px; text-align: center;">
        <div class="lang-switch" style="display: inline-flex;">
          <button class="lang-btn active" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
